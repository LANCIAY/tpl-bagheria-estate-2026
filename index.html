<main style="padding:20px; max-width:600px; margin:auto;">

  <h1>🚌 Trasporto Pubblico Bagheria</h1>
  <p>Estate 2026</p>

  <hr>

  <h2>🔎 Cerca una linea</h2>
  <input id="search" placeholder="Es: Linea 1" style="width:100%; padding:10px;">

  <div id="linee"></div>

</main>

<script>
fetch("data/linee.json")
  .then(r => r.json())
  .then(data => {

    const container = document.getElementById("linee");
    const search = document.getElementById("search");

    function render(filter = "") {
      container.innerHTML = "";

      data
        .filter(l => l.nome.toLowerCase().includes(filter.toLowerCase()))
        .forEach(l => {

          const div = document.createElement("div");
          div.style = "padding:10px; border:1px solid #ccc; margin-top:10px; cursor:pointer;";

          div.innerHTML = `
            <b>${l.nome}</b><br>
            <small>${l.capolinea}</small>
          `;

          div.onclick = () => {
            window.location.href = "linea.html?id=" + l.id;
          };

          container.appendChild(div);
        });
    }

    search.addEventListener("input", e => {
      render(e.target.value);
    });

    render();
  });
</script>
